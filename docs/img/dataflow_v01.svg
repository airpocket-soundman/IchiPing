<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" role="img" aria-label="v0.1 dataflow: FRDM-MCXN947 generates synthetic chirp+reverb, frames over UART 921600 to PC, which saves WAV and CSV labels">
  <title>IchiPing v0.1 data flow</title>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ea8fe"/>
    </marker>
    <linearGradient id="boxBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f242d"/>
      <stop offset="100%" stop-color="#181b22"/>
    </linearGradient>
  </defs>
  <style>
    .box { fill: url(#boxBg); stroke: #2a313d; stroke-width: 1.4; rx: 10; }
    .lbl-title { fill: #e5e9f0; font-family: 'Hiragino Sans','Yu Gothic UI','Segoe UI',sans-serif; font-size: 14px; font-weight: 700; }
    .lbl-sub { fill: #8b95a7; font-family: 'JetBrains Mono',Consolas,monospace; font-size: 11px; }
    .lbl-flow { fill: #6ea8fe; font-family: 'JetBrains Mono',Consolas,monospace; font-size: 12px; font-weight: 600; }
    .lbl-flow-sub { fill: #8b95a7; font-family: 'Hiragino Sans','Yu Gothic UI',sans-serif; font-size: 11px; }
    .arrow { stroke: #6ea8fe; stroke-width: 2.2; fill: none; }
  </style>

  <!-- MCU box -->
  <rect class="box" x="20" y="50" width="270" height="120" rx="10"/>
  <text class="lbl-title" x="155" y="78" text-anchor="middle">FRDM-MCXN947</text>
  <text class="lbl-sub" x="155" y="96" text-anchor="middle">firmware/source/main.c</text>
  <line x1="40" y1="105" x2="270" y2="105" stroke="#2a313d" stroke-width="1"/>
  <text class="lbl-sub" x="155" y="124" text-anchor="middle" fill="#7be0a4">dummy_audio_generate()</text>
  <text class="lbl-sub" x="155" y="140" text-anchor="middle">chirp 200→8 kHz + 残響テール</text>
  <text class="lbl-sub" x="155" y="156" text-anchor="middle">→ ichp_pack_frame()</text>

  <!-- Arrow -->
  <path class="arrow" d="M290,110 L470,110" marker-end="url(#arr)"/>
  <text class="lbl-flow" x="380" y="98" text-anchor="middle">UART 921600 bps</text>
  <text class="lbl-flow-sub" x="380" y="130" text-anchor="middle">64 KB/frame, 3 秒周期</text>

  <!-- PC box -->
  <rect class="box" x="470" y="50" width="270" height="120" rx="10"/>
  <text class="lbl-title" x="605" y="78" text-anchor="middle">PC</text>
  <text class="lbl-sub" x="605" y="96" text-anchor="middle">pc/receiver.py</text>
  <line x1="490" y1="105" x2="720" y2="105" stroke="#2a313d" stroke-width="1"/>
  <text class="lbl-sub" x="605" y="124" text-anchor="middle" fill="#7be0a4">sync → unpack → CRC 検証</text>
  <text class="lbl-sub" x="605" y="140" text-anchor="middle">→ captures/frame_*.wav</text>
  <text class="lbl-sub" x="605" y="156" text-anchor="middle">→ captures/labels.csv</text>

  <!-- Caption -->
  <text class="lbl-flow-sub" x="380" y="200" text-anchor="middle">ICHP フレーム（36 B ヘッダ + N×2 B int16 PCM + 2 B CRC-16/CCITT-FALSE）</text>
</svg>
