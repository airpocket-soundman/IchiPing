<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" role="img" aria-label="Bring-up decision tree for v0.1 hardware verification">
  <title>v0.1 実機ブリングアップ判断フロー</title>
  <defs>
    <marker id="arr-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7be0a4"/>
    </marker>
    <marker id="arr-bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff7ab6"/>
    </marker>
  </defs>
  <style>
    .step    { fill: #1f242d; stroke: #6ea8fe; stroke-width: 1.4; rx: 8; }
    .ok      { fill: #1f242d; stroke: #7be0a4; stroke-width: 1.4; rx: 8; }
    .bad     { fill: #1f242d; stroke: #ff7ab6; stroke-width: 1.4; rx: 8; }
    .decide  { fill: #1f242d; stroke: #ffb454; stroke-width: 1.4; }
    .ttl     { fill: #e5e9f0; font-family: 'Hiragino Sans','Yu Gothic UI','Segoe UI',sans-serif; font-size: 13px; font-weight: 700; }
    .sub     { fill: #8b95a7; font-family: 'JetBrains Mono',Consolas,monospace; font-size: 11px; }
    .arrow   { stroke: #6ea8fe; stroke-width: 1.8; fill: none; }
    .a-ok    { stroke: #7be0a4; stroke-width: 1.8; fill: none; }
    .a-bad   { stroke: #ff7ab6; stroke-width: 1.8; fill: none; }
    .ylbl    { fill: #7be0a4; font-family: 'JetBrains Mono',Consolas,monospace; font-size: 11px; font-weight: 700; }
    .nlbl    { fill: #ff7ab6; font-family: 'JetBrains Mono',Consolas,monospace; font-size: 11px; font-weight: 700; }
  </style>

  <!-- Step 1: flash -->
  <rect class="step" x="240" y="20" width="280" height="50"/>
  <text class="ttl" x="380" y="42" text-anchor="middle">① ファーム書込 (OpenSDA)</text>
  <text class="sub" x="380" y="58" text-anchor="middle">MCUXpresso でビルド → Flash → Reset</text>

  <path class="arrow" d="M380,70 L380,90" marker-end="url(#arr-ok)"/>

  <!-- Step 2: COM detect -->
  <rect class="step" x="240" y="90" width="280" height="50"/>
  <text class="ttl" x="380" y="112" text-anchor="middle">② COM ポート確認</text>
  <text class="sub" x="380" y="128" text-anchor="middle">デバイスマネージャ → OpenSDA COMx を控える</text>

  <path class="arrow" d="M380,140 L380,160" marker-end="url(#arr-ok)"/>

  <!-- Decision: PWR LED -->
  <polygon class="decide" points="380,160 540,200 380,240 220,200" />
  <text class="ttl" x="380" y="198" text-anchor="middle">③ PWR LED 点灯？</text>
  <text class="sub" x="380" y="214" text-anchor="middle">（OpenSDA 給電通電チェック）</text>

  <!-- Branch: PWR no -->
  <path class="a-bad" d="M220,200 L130,200" marker-end="url(#arr-bad)"/>
  <text class="nlbl" x="175" y="194" text-anchor="middle">no</text>
  <rect class="bad" x="20" y="180" width="200" height="44"/>
  <text class="ttl" x="120" y="200" text-anchor="middle" fill="#ff7ab6">USB ケーブル / OpenSDA 確認</text>
  <text class="sub" x="120" y="216" text-anchor="middle">充電専用ケーブルでは× / J17</text>

  <!-- Branch: PWR yes -->
  <path class="a-ok" d="M380,240 L380,260" marker-end="url(#arr-ok)"/>
  <text class="ylbl" x="392" y="254">yes</text>

  <!-- Step 4: run receiver -->
  <rect class="step" x="240" y="260" width="280" height="50"/>
  <text class="ttl" x="380" y="282" text-anchor="middle">④ receiver.py 起動</text>
  <text class="sub" x="380" y="298" text-anchor="middle">python receiver.py --port COMx --baud 921600</text>

  <path class="arrow" d="M380,310 L380,330" marker-end="url(#arr-ok)"/>

  <!-- Decision: frames flowing -->
  <polygon class="decide" points="380,330 540,370 380,410 220,370" />
  <text class="ttl" x="380" y="368" text-anchor="middle">⑤ フレーム到着？</text>
  <text class="sub" x="380" y="384" text-anchor="middle">[seq] t=…ms CRC=OK の行が出る</text>

  <!-- Branch: frames no -->
  <path class="a-bad" d="M220,370 L130,370" marker-end="url(#arr-bad)"/>
  <text class="nlbl" x="175" y="364" text-anchor="middle">no</text>
  <rect class="bad" x="20" y="350" width="200" height="44"/>
  <text class="ttl" x="120" y="370" text-anchor="middle" fill="#ff7ab6">他端末が COM を掴んでいる？</text>
  <text class="sub" x="120" y="386" text-anchor="middle">TeraTerm 等を閉じる / 再フラッシュ</text>

  <!-- Branch: frames yes -->
  <path class="a-ok" d="M380,410 L380,430" marker-end="url(#arr-ok)"/>
  <text class="ylbl" x="392" y="424">yes</text>

  <!-- Decision: CRC OK -->
  <polygon class="decide" points="380,430 540,470 380,510 220,470" />
  <text class="ttl" x="380" y="468" text-anchor="middle">⑥ CRC OK 連続 100 フレーム？</text>
  <text class="sub" x="380" y="484" text-anchor="middle">--max-frames 100 で完走 / bad CRC = 0</text>

  <!-- Branch: CRC no -->
  <path class="a-bad" d="M220,470 L130,470" marker-end="url(#arr-bad)"/>
  <text class="nlbl" x="175" y="464" text-anchor="middle">no</text>
  <rect class="bad" x="20" y="450" width="200" height="44"/>
  <text class="ttl" x="120" y="470" text-anchor="middle" fill="#ff7ab6">バッファ溢れ疑い</text>
  <text class="sub" x="120" y="486" text-anchor="middle">フレーム周期↑ / RX バッファ↑</text>

  <!-- Branch: CRC yes -->
  <path class="a-ok" d="M540,470 L620,470" marker-end="url(#arr-ok)"/>
  <text class="ylbl" x="580" y="464" text-anchor="middle">yes</text>
  <rect class="ok" x="620" y="450" width="120" height="44"/>
  <text class="ttl" x="680" y="470" text-anchor="middle" fill="#7be0a4">IP-0.1.8 完了</text>
  <text class="sub" x="680" y="486" text-anchor="middle">v0.2 へ進める</text>
</svg>
