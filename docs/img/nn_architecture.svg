<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" role="img" aria-label="IchiPing v1 multi-task 1D-CNN architecture: 1024-bin log-magnitude spectrum input, three Conv1D + BN + ReLU layers, global average pool, six task heads">
  <title>IchiPing v1 NN — multi-task 1D-CNN</title>
  <defs>
    <marker id="arrNN" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ea8fe"/>
    </marker>
    <linearGradient id="boxGr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f242d"/>
      <stop offset="100%" stop-color="#181b22"/>
    </linearGradient>
  </defs>
  <style>
    .box-in   { fill: url(#boxGr); stroke: #7be0a4; stroke-width: 1.6; rx: 8; }
    .box-conv { fill: url(#boxGr); stroke: #6ea8fe; stroke-width: 1.6; rx: 8; }
    .box-pool { fill: url(#boxGr); stroke: #ffb454; stroke-width: 1.6; rx: 8; }
    .box-head { fill: url(#boxGr); stroke: #ff7ab6; stroke-width: 1.4; rx: 6; }
    .box-out  { fill: url(#boxGr); stroke: #7be0a4; stroke-width: 1.2; rx: 6; }
    .ttl   { fill: #e5e9f0; font-family: 'Hiragino Sans','Yu Gothic UI','Segoe UI',sans-serif; font-size: 13.5px; font-weight: 700; }
    .ttl-s { fill: #e5e9f0; font-family: 'Hiragino Sans','Yu Gothic UI','Segoe UI',sans-serif; font-size: 12px; font-weight: 600; }
    .sub   { fill: #8b95a7; font-family: 'JetBrains Mono',Consolas,monospace; font-size: 11px; }
    .sub-s { fill: #8b95a7; font-family: 'JetBrains Mono',Consolas,monospace; font-size: 10px; }
    .lbl-shape { fill: #6ea8fe; font-family: 'JetBrains Mono',Consolas,monospace; font-size: 10.5px; font-weight: 600; }
    .arrow { stroke: #6ea8fe; stroke-width: 1.8; fill: none; }
    .tag   { fill: #2a313d; stroke: #8b95a7; stroke-width: 0.8; rx: 3; }
    .tag-t { fill: #e5e9f0; font-family: 'JetBrains Mono',Consolas,monospace; font-size: 10px; font-weight: 600; }
  </style>

  <!-- Input -->
  <rect class="box-in" x="290" y="20" width="240" height="50"/>
  <text class="ttl" x="410" y="42" text-anchor="middle">入力: 1024-bin log-mag スペクトル</text>
  <text class="sub" x="410" y="58" text-anchor="middle">2048-pt rFFT → drop DC → log10 → norm</text>
  <text class="lbl-shape" x="410" y="86" text-anchor="middle">shape: (B, 1024)  →  reshape (B, 1, 1024)</text>

  <path class="arrow" d="M410,90 L410,110" marker-end="url(#arrNN)"/>

  <!-- Conv1D block 1 -->
  <rect class="box-conv" x="240" y="110" width="340" height="60"/>
  <text class="ttl-s" x="410" y="130" text-anchor="middle">Conv1D 16ch / k=16 / s=4  →  BN  →  ReLU</text>
  <text class="sub" x="410" y="146" text-anchor="middle">受容野で粗い周波数構造（モード／RT60 帯域）を学習</text>
  <text class="lbl-shape" x="410" y="164" text-anchor="middle">→ (B, 16, 256)</text>

  <path class="arrow" d="M410,170 L410,190" marker-end="url(#arrNN)"/>

  <!-- Conv1D block 2 -->
  <rect class="box-conv" x="240" y="190" width="340" height="60"/>
  <text class="ttl-s" x="410" y="210" text-anchor="middle">Conv1D 32ch / k=8 / s=4  →  BN  →  ReLU</text>
  <text class="sub" x="410" y="226" text-anchor="middle">中レンジ特徴（DRR、初期反射位置）を抽出</text>
  <text class="lbl-shape" x="410" y="244" text-anchor="middle">→ (B, 32, 64)</text>

  <path class="arrow" d="M410,250 L410,270" marker-end="url(#arrNN)"/>

  <!-- Conv1D block 3 -->
  <rect class="box-conv" x="240" y="270" width="340" height="60"/>
  <text class="ttl-s" x="410" y="290" text-anchor="middle">Conv1D 64ch / k=4 / s=2  →  BN  →  ReLU</text>
  <text class="sub" x="410" y="306" text-anchor="middle">高次タスク特徴（部屋トポロジ寄与）</text>
  <text class="lbl-shape" x="410" y="324" text-anchor="middle">→ (B, 64, 32)</text>

  <path class="arrow" d="M410,330 L410,350" marker-end="url(#arrNN)"/>

  <!-- Global average pool -->
  <rect class="box-pool" x="290" y="350" width="240" height="50"/>
  <text class="ttl" x="410" y="372" text-anchor="middle">Global Average Pool (1D)</text>
  <text class="sub" x="410" y="388" text-anchor="middle">時間軸を畳む → 共有埋め込み 64-d</text>

  <!-- Embedding arrow + bus -->
  <path class="arrow" d="M410,400 L410,420" marker-end="url(#arrNN)"/>
  <rect class="tag" x="370" y="424" width="80" height="20"/>
  <text class="tag-t" x="410" y="438" text-anchor="middle">shared 64-d</text>

  <!-- Fan-out arrows + 6 heads -->
  <!-- target Y for heads -->
  <!-- Each head at x positions: 30, 162, 294, 426, 558, 690 (width 124) -->
  <path class="arrow" d="M410,444 L  92,520" marker-end="url(#arrNN)"/>
  <path class="arrow" d="M410,444 L 224,520" marker-end="url(#arrNN)"/>
  <path class="arrow" d="M410,444 L 356,520" marker-end="url(#arrNN)"/>
  <path class="arrow" d="M410,444 L 488,520" marker-end="url(#arrNN)"/>
  <path class="arrow" d="M410,444 L 620,520" marker-end="url(#arrNN)"/>
  <path class="arrow" d="M410,444 L 752,520" marker-end="url(#arrNN)"/>

  <!-- 6 heads -->
  <rect class="box-head" x="30"  y="520" width="124" height="68"/>
  <text class="ttl-s" x="92" y="540" text-anchor="middle">any_open</text>
  <text class="sub-s" x="92" y="554" text-anchor="middle">FC(64→1)</text>
  <text class="sub-s" x="92" y="568" text-anchor="middle">BCE w/ logits</text>
  <text class="lbl-shape" x="92" y="582" text-anchor="middle">→ sigmoid</text>

  <rect class="box-head" x="162" y="520" width="124" height="68"/>
  <text class="ttl-s" x="224" y="540" text-anchor="middle">door_AB</text>
  <text class="sub-s" x="224" y="554" text-anchor="middle">FC(64→1)</text>
  <text class="sub-s" x="224" y="568" text-anchor="middle">MSE (0..1)</text>
  <text class="lbl-shape" x="224" y="582" text-anchor="middle">→ continuous</text>

  <rect class="box-head" x="294" y="520" width="124" height="68"/>
  <text class="ttl-s" x="356" y="540" text-anchor="middle">door_BC</text>
  <text class="sub-s" x="356" y="554" text-anchor="middle">FC(64→3)</text>
  <text class="sub-s" x="356" y="568" text-anchor="middle">CrossEntropy</text>
  <text class="lbl-shape" x="356" y="582" text-anchor="middle">→ softmax (3)</text>

  <rect class="box-head" x="426" y="520" width="124" height="68"/>
  <text class="ttl-s" x="488" y="540" text-anchor="middle">window_a</text>
  <text class="sub-s" x="488" y="554" text-anchor="middle">FC(64→1)</text>
  <text class="sub-s" x="488" y="568" text-anchor="middle">MSE (0..1)</text>
  <text class="lbl-shape" x="488" y="582" text-anchor="middle">→ continuous</text>

  <rect class="box-head" x="558" y="520" width="124" height="68"/>
  <text class="ttl-s" x="620" y="540" text-anchor="middle">window_b</text>
  <text class="sub-s" x="620" y="554" text-anchor="middle">FC(64→3)</text>
  <text class="sub-s" x="620" y="568" text-anchor="middle">CrossEntropy</text>
  <text class="lbl-shape" x="620" y="582" text-anchor="middle">→ softmax (3)</text>

  <rect class="box-head" x="690" y="520" width="124" height="68"/>
  <text class="ttl-s" x="752" y="540" text-anchor="middle">window_c</text>
  <text class="sub-s" x="752" y="554" text-anchor="middle">FC(64→3)</text>
  <text class="sub-s" x="752" y="568" text-anchor="middle">CrossEntropy</text>
  <text class="lbl-shape" x="752" y="582" text-anchor="middle">→ softmax (3)</text>

  <!-- Side annotations -->
  <rect class="tag" x="600" y="20" width="170" height="20"/>
  <text class="tag-t" x="685" y="34" text-anchor="middle">target: ~30 K params / ~30 KB INT8</text>

  <rect class="tag" x="50" y="20" width="170" height="20"/>
  <text class="tag-t" x="135" y="34" text-anchor="middle">spec.html §4.3 準拠</text>
</svg>
