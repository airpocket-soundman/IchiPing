# 00_demo needs LPSPI (TFT data path), LPI2C (servo driver) and LPUART
# (binary frame stream over OpenSDA VCP) all enabled at once.
CONFIG_MCUX_COMPONENT_driver.lpflexcomm_lpspi=y
CONFIG_MCUX_COMPONENT_driver.lpflexcomm_lpi2c=y
CONFIG_MCUX_COMPONENT_driver.lpflexcomm_lpuart=y
