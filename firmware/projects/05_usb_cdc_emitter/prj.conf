# 05_usb_cdc_emitter needs the USB device stack + CDC class.
# The actual middleware Kconfig symbols depend on your SDK version;
# below is the conventional set for MCXN94x USB-FS device.
CONFIG_MCUX_COMPONENT_middleware.usb.device.stack=y
CONFIG_MCUX_COMPONENT_middleware.usb.device.cdc=y
CONFIG_MCUX_COMPONENT_middleware.usb.phy=y
