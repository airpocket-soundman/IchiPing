# Mirrors the symbols set by the SDK's usb_device_cdc_vcom/bm prj.conf,
# which is the proven-working configuration on FRDM-MCXN947.
CONFIG_FSL_OSA_TASK_ENABLE=n
CONFIG_MCUX_COMPONENT_middleware.usb.common_header=y
CONFIG_MCUX_COMPONENT_middleware.usb.device.common_header=y
CONFIG_MCUX_PRJSEG_component.osa_interface.generated_config=y
CONFIG_MCUX_PRJSEG_module.board.pinmux_customize_folder=y
CONFIG_MCUX_PRJSEG_project.hw_app_customize_folder=y
CONFIG_USB_DEVICE_CONFIG_CDC_ACM=1
CONFIG_USB_DEVICE_CONFIG_ROOT2_TEST=y
